name: Code Quality

"on":
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history needed to compute changed files against the base branch
          fetch-depth: 0

      # Determine whether to run checks globally (push to master) or per-changed-files (PRs)
      - name: Determine run mode
        id: run_mode
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "run_globally=true" >> $GITHUB_OUTPUT
            echo "Run mode: global (push to master)"
          else
            echo "run_globally=false" >> $GITHUB_OUTPUT
            echo "Run mode: changed-files (PR or non-master push)"
          fi

      # Detect which files changed in this PR / push
      - name: Get changed files
        if: steps.run_mode.outputs.run_globally == 'false'
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files_yaml: |
            python:
              - '**/*.py'
            csv:
              - 'files/**/*.csv'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
              - '.yamllint.yaml'
            # Config files that should re-trigger checks when changed
            configs:
              - '.flake8'
              - '.isort.cfg'
              - '.gitattributes'
              - '.yamllint.yaml'

      # Short debug log: show which groups changed (helps troubleshooting CI runs)
      - name: Log changed-files summary
        if: steps.run_mode.outputs.run_globally == 'false'
        run: |
          echo "changed: python=${{ steps.changed-files.outputs.python_any_changed }}"
          echo "files: python=${{ steps.changed-files.outputs.python_all_changed_files }}"
          echo "changed: csv=${{ steps.changed-files.outputs.csv_any_changed }}"
          echo "files: csv=${{ steps.changed-files.outputs.csv_all_changed_files }}"
          echo "changed: yaml=${{ steps.changed-files.outputs.yaml_any_changed }}"
          echo "files: yaml=${{ steps.changed-files.outputs.yaml_all_changed_files }}"
          echo "changed: configs=${{ steps.changed-files.outputs.configs_any_changed }}"
          echo "files: configs=${{ steps.changed-files.outputs.configs_all_changed_files }}"

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Note: 'Cache not found' and 'Failed to save cache' warnings are
      # expected and not errors. See GitHub Actions docs for details.
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/dev-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt

      # ═══════════════════════════════════════════════════════════════════════
      # ⚡ RUNTIME VALIDATION (NEW - Catches issues that fail at runtime)
      # Runs BEFORE static analysis to catch import errors early
      # ═══════════════════════════════════════════════════════════════════════

      - name: Validate module imports can be resolved

        run: |
          echo "🔍 Validating that all modules can be imported..."
          python -c "
          import sys
          import traceback
          import ast
          from pathlib import Path
          import importlib

          # Test 1: Import entry points
          try:
              import app
              print('✓ app module imported successfully')
              import main
              print('✓ main module imported successfully')
          except ModuleNotFoundError as e:
              print(f'::error::ModuleNotFoundError: {e}')
              traceback.print_exc()
              sys.exit(1)
          except Exception as e:
              print(f'::error::Import failed with exception: {e}')
              traceback.print_exc()
              sys.exit(1)

          # Test 2: Try to import all Python modules to detect broken imports at runtime
          print('🔗 Detecting broken imports by attempting module imports...')
          errors = []

          for py_file in sorted(Path('app').rglob('*.py')):
              if '__pycache__' in str(py_file):
                  continue

              # Convert file path to module name
              module_parts = list(py_file.relative_to('.').parts[:-1]) + [py_file.stem]
              if module_parts[-1] == '__init__':
                  module_parts = module_parts[:-1]

              module_name = '.'.join(module_parts)

              try:
                  importlib.import_module(module_name)
              except ModuleNotFoundError as e:
                  errors.append(f'{py_file}: {str(e)}')
              except Exception:
                  # Ignore other exceptions (e.g., runtime errors)
                  pass

          if errors:
              print(f'::error::Found {len(errors)} files with broken imports:')
              for error in errors:
                  print(f'::error::{error}')
              sys.exit(1)
          print('✓ All module imports successful')
          "
        # Note: This import validation catches issues like:
        # - Syntax errors in __init__.py that prevent module loading and cause ImportError
        # - Broken imports in __init__.py that cause ImportError
        # - Missing dependencies that cause ImportError
        # - Circular imports that cause ImportError or RuntimeError
        # It does NOT catch all possible runtime issues, but it catches a large class of common problems that static analysis can miss.
      - name: Validate __init__.py exports and detect circular imports

        run: |
          echo "🔎 Validating __init__.py re-exports and circular dependencies..."
          python -c "
          import sys
          import ast
          import importlib.util
          from pathlib import Path
          from collections import deque, defaultdict

          def find_all_init_files():
              \"\"\"Find all __init__.py files in the project.\"\"\"
              return list(Path('app').rglob('__init__.py'))

          def check_exports(init_file):
              \"\"\"Check that all __all__ exports exist in the module.\"\"\"
              try:
                  with open(init_file, 'r', encoding='utf-8') as f:
                      tree = ast.parse(f.read())

                  all_names = None
                  available = {}

                  # Find __all__ and collect available names (imports, functions, classes)
                  for node in ast.walk(tree):
                      if isinstance(node, ast.Assign):
                          for target in node.targets:
                              if isinstance(target, ast.Name) and target.id == '__all__':
                                  if isinstance(node.value, ast.List):
                                      all_names = [elt.value for elt in node.value.elts if isinstance(elt, ast.Constant)]
                      elif isinstance(node, ast.ImportFrom):
                          for alias in node.names:
                              available[alias.asname or alias.name] = True
                      elif isinstance(node, ast.Import):
                          for alias in node.names:
                              available[alias.asname or alias.name] = True
                      elif isinstance(node, ast.FunctionDef):
                          available[node.name] = True
                      elif isinstance(node, ast.ClassDef):
                          available[node.name] = True

                  # Verify all exported names exist
                  if all_names:
                      for name in all_names:
                          if name not in available:
                              print(f'::error::{init_file}: exported name \\\"{name}\\\" not found in imports or definitions')
                              return False
                  return True
              except SyntaxError as e:
                  print(f'::error::{init_file}: Syntax error: {e}')
                  return False
              except Exception as e:
                  print(f'::error::{init_file}: {e}')
                  return False

          def detect_circular_imports(init_files):
              \"\"\"Detect circular dependencies between modules.\"\"\"
              graph = defaultdict(set)
              file_to_module = {}

              # Build import graph
              for init_file in init_files:
                  module_path = str(init_file).replace('\\\\', '/').replace('__init__.py', '').rstrip('/')
                  module_name = module_path.replace('/', '.').replace('app.', '', 1) if 'app' in module_path else module_path
                  file_to_module[str(init_file)] = module_name

                  try:
                      with open(init_file, 'r', encoding='utf-8') as f:
                          tree = ast.parse(f.read())
                      for node in ast.walk(tree):
                          if isinstance(node, ast.ImportFrom) and node.module:
                              if node.module.startswith('app'):
                                  graph[module_name].add(node.module)
                  except Exception:
                      pass

              # Check for cycles using DFS
              visited = set()
              rec_stack = set()
              cycles = []

              def has_cycle(node, path):
                  visited.add(node)
                  rec_stack.add(node)
                  path.append(node)

                  for neighbor in graph[node]:
                      if neighbor not in visited:
                          if has_cycle(neighbor, path.copy()):
                              return True
                      elif neighbor in rec_stack:
                          cycle = path[path.index(neighbor):] + [neighbor]
                          cycles.append(' -> '.join(cycle))
                          return True

                  rec_stack.discard(node)
                  return False

              for node in list(graph.keys()):
                  if node not in visited:
                      has_cycle(node, [])

              if cycles:
                  for cycle in cycles:
                      print(f'::warning::Circular import detected: {cycle}')
              return True

          # Run all checks
          all_valid = True
          init_files = find_all_init_files()

          # Check 1: __all__ exports
          print('📋 Checking __all__ exports...')
          for init_file in init_files:
              if not check_exports(init_file):
                  all_valid = False

          # Check 2: Circular dependencies (import resolution already checked in pipeline Stage 1)
          print('🔄 Detecting circular dependencies...')
          detect_circular_imports(init_files)

          if all_valid:
              print(f'✓ All {len(init_files)} __init__.py files validated')
          else:
              sys.exit(1)
          "

      # ═══════════════════════════════════════════════════════════════════════
      # STAGE 2: CODE FORMATTING (Run before linters to fix obvious issues)
      # ═══════════════════════════════════════════════════════════════════════

      - name: Check Python formatting (black)
        if: steps.run_mode.outputs.run_globally == 'false' || steps.changed-files.outputs.python_any_changed == 'true'
        run: |
          if [ "${{ steps.run_mode.outputs.run_globally }}" = "true" ]; then
            FILES='.'
          else
            FILES='${{ steps.changed-files.outputs.python_all_changed_files }}'
          fi

          # Clean up file list to single line
          FILES=$(echo "$FILES" | tr '\n' ' ' | xargs)

          if [ -z "$FILES" ]; then
            echo "No files to check."
          else
            if ! python -m black --check $FILES; then
              echo "::error::Python formatting issues found. Run 'python -m black .' locally and commit."
              exit 1
            fi
          fi

      # ═══════════════════════════════════════════════════════════════════════
      # STAGE 3: IMPORT ORDER CHECK (After black to preserve formatting)
      # ═══════════════════════════════════════════════════════════════════════

      - name: Check import order (isort)
        if: steps.run_mode.outputs.run_globally == 'false' || steps.changed-files.outputs.python_any_changed == 'true'
        run: |
          if [ "${{ steps.run_mode.outputs.run_globally }}" = "true" ]; then
            # No args → script scans the whole project by default
            if ! python app/scripts/check_imports.py; then
              echo "::error::Import order issues found. Run 'python app/scripts/format_imports.py' locally and commit."
              exit 1
            fi
          else
            FILES='${{ steps.changed-files.outputs.python_all_changed_files }}'
            if [ -n "$FILES" ]; then
              if ! python app/scripts/check_imports.py $FILES; then
                echo "::error::Import order issues found. Run 'python app/scripts/format_imports.py' locally and commit."
                exit 1
              fi
            fi
          fi

      # ═══════════════════════════════════════════════════════════════════════
      # STAGE 4: CODE LINTING (After formatting and import order are fixed)
      # ═══════════════════════════════════════════════════════════════════════

      - name: Lint Python (flake8)
        run: |
          echo "Running flake8 on: . (full project)"
          if ! python -m flake8 .; then
            echo "::error::Python linting issues found. Fix the issues locally and commit."
            exit 1
          fi

      # ═══════════════════════════════════════════════════════════════════════
      # STAGE 5: DATA FILE VALIDATION (CSV & YAML - independent of Python)
      # ═══════════════════════════════════════════════════════════════════════

      - name: Lint CSV
        run: |
          echo "Running CSV linter on: app/files/ (full scan)"
          if ! python app/scripts/lint_csv.py; then
            echo "::error::CSV issues found. Run 'python app/scripts/format_csv.py' locally to auto-fix style issues."
            echo "::error::Other CSV problems must be fixed manually and then committed."
            exit 1
          fi

      - name: Lint YAML (yamllint)
        if: steps.run_mode.outputs.run_globally == 'false' || steps.changed-files.outputs.yaml_any_changed == 'true'
        run: |
          if [ "${{ steps.run_mode.outputs.run_globally }}" = "true" ]; then
            FILES='.'
          else
            FILES='${{ steps.changed-files.outputs.yaml_all_changed_files }}'
          fi

          if [ -n "$FILES" ]; then
            if ! python -m yamllint $FILES; then
              echo "::error::YAML linting issues found. Fix the YAML files manually."
              exit 1
            fi
          fi

      # ═══════════════════════════════════════════════════════════════════════
      # STAGE 6: TYPE CHECKING (Last - slowest, needs full module graph)
      # ═══════════════════════════════════════════════════════════════════════
      # mypy always runs on the full target (app + main.py) regardless of mode
      # because type checking requires the full module graph — partial runs miss
      # cross-module type errors and give false-clean results.
      - name: Type check Python (mypy)
        run: |
          if ! python -m mypy app main.py; then
            echo "::error::Type checking issues found. Run 'python -m mypy app main.py' locally and fix the errors before committing."
            exit 1
          fi
